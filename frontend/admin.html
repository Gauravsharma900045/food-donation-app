<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodShare – Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #22c55e;
      --green-dark: #16a34a;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
      --dark: #0a0f1e;
      --dark2: #111827;
      --card: #1a2235;
      --card2: #1e283b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.07);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: rgba(10,15,30,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--green), #86efac);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .admin-badge {
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      color: var(--orange);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 10px;
    }
    .btn-logout {
      padding: 9px 20px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 9px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    .main { padding: 40px; max-width: 1300px; margin: 0 auto; }

    .page-title { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .stat-card.green::before { background: linear-gradient(90deg, var(--green), transparent); }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--blue), transparent); }
    .stat-card.orange::before { background: linear-gradient(90deg, var(--orange), transparent); }
    .stat-card.red::before { background: linear-gradient(90deg, var(--red), transparent); }
    .stat-card:hover { transform: translateY(-3px); border-color: rgba(34,197,94,0.2); }
    .stat-icon { font-size: 32px; margin-bottom: 12px; }
    .stat-num { font-size: 40px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .stat-num.green { color: var(--green); }
    .stat-num.blue { color: #60a5fa; }
    .stat-num.orange { color: var(--orange); }
    .stat-num.red { color: #f87171; }
    .stat-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

    /* TABLE */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-title { font-size: 16px; font-weight: 700; }
    .table-count { font-size: 13px; color: var(--muted); }

    .search-wrap { display: flex; gap: 12px; align-items: center; }
    .table-search {
      padding: 8px 14px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 220px;
      transition: border-color 0.3s;
    }
    .table-search:focus { border-color: rgba(34,197,94,0.4); }
    .table-search::placeholder { color: var(--muted); }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--card2); }
    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid var(--border); }
    tbody tr { transition: background 0.2s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:last-child td { border-bottom: none; }

    .role-pill {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
    }
    .role-donor { background: rgba(34,197,94,0.15); color: var(--green); }
    .role-receiver { background: rgba(249,115,22,0.15); color: var(--orange); }

    .btn-delete {
      padding: 6px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #f87171;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.25); }

    .empty-row td {
      text-align: center;
      color: var(--muted);
      padding: 50px;
      font-size: 15px;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .stats-grid { animation: slideUp 0.5s ease; }
    .table-card { animation: slideUp 0.6s ease; }
  </style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center;">
    <div class="header-brand">🍱 FoodShare</div>
    <span class="admin-badge">👑 Admin Panel</span>
  </div>
  <button class="btn-logout" onclick="logout()">Logout</button>
</header>

<div class="main">
  <div class="page-title">System Overview</div>
  <div class="page-sub">Manage users and monitor platform health.</div>

  <div class="stats-grid">
    <div class="stat-card green">
      <div class="stat-icon">🤝</div>
      <div class="stat-num green" id="statDonors">–</div>
      <div class="stat-label">Total Donors</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-icon">🙏</div>
      <div class="stat-num orange" id="statReceivers">–</div>
      <div class="stat-label">Total Receivers</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">🍽</div>
      <div class="stat-num blue" id="statFoods">–</div>
      <div class="stat-label">Foods Listed</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">✅</div>
      <div class="stat-num green" id="statCompleted">–</div>
      <div class="stat-label">Completed Donations</div>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <div>
        <div class="table-title">👥 User Management</div>
        <div class="table-count" id="userCount">Loading…</div>
      </div>
      <div class="search-wrap">
        <input class="table-search" id="userSearch" placeholder="🔍 Search users…" oninput="filterUsers()">
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Joined</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(!token || role !== "admin") {
  alert("🚫 Admin access required.");
  window.location.href = "login.html";
}

let allUsers = [];

async function loadStats() {
  const res = await fetch("https://foodshare-backend-ao8p.onrender.com/api/admin/stats", { headers: { "Authorization": token } });
  const data = await res.json();
  document.getElementById("statDonors").innerText = data.totalDonors;
  document.getElementById("statReceivers").innerText = data.totalReceivers;
  document.getElementById("statFoods").innerText = data.totalFoods;
  document.getElementById("statCompleted").innerText = data.completedDonations;
}

async function loadUsers() {
  const res = await fetch("https://foodshare-backend-ao8p.onrender.com/api/admin/users", { headers: { "Authorization": token } });
  allUsers = await res.json();
  document.getElementById("userCount").innerText = `${allUsers.length} total registered users`;
  renderUsers(allUsers);
}

function renderUsers(users) {
  const tbody = document.getElementById("userTable");
  tbody.innerHTML = "";
  if(users.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="5">No users found.</td></tr>`;
    return;
  }
  users.forEach(u => {
    const joined = new Date(u.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    tbody.innerHTML += `
      <tr>
        <td><b>${u.name}</b></td>
        <td style="color:var(--muted)">${u.email}</td>
        <td><span class="role-pill role-${u.role}">${u.role.toUpperCase()}</span></td>
        <td style="color:var(--muted); font-size:12px;">${joined}</td>
        <td><button class="btn-delete" onclick="deleteUser('${u._id}')">🗑 Delete</button></td>
      </tr>
    `;
  });
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  renderUsers(allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
}

async function deleteUser(id) {
  if(!confirm("⚠️ This will permanently delete the user and all their food listings. Continue?")) return;
  await fetch("https://foodshare-backend-ao8p.onrender.com/api/admin/user/" + id, {
    method: "DELETE",
    headers: { "Authorization": token }
  });
  loadUsers();
  loadStats();
}

function logout() { localStorage.clear(); window.location.href = "login.html"; }

loadStats();
loadUsers();
</script>
</body>
</html>
